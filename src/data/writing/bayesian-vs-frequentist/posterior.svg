<svg viewBox="0 0 760 295" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="13">

  <!-- Title -->
  <text x="380" y="20" text-anchor="middle" fill="#F3F4F6" font-size="13" font-weight="bold">Posterior Distribution: Beta(15, 7)</text>

  <!-- Plot area border only, no fill -->
  <rect x="65" y="30" width="630" height="212" fill="none" stroke="#374151" rx="4"/>

  <!-- Full area under curve (very light tint) -->
  <polygon points="65,242 128,242 191,242 254,242 285,241 317,237 348,226 380,202 412,161 443,106 475,54 506,32 538,57 569,123 601,192 632,232 664,242 695,242"
           fill="#6366F1" fill-opacity="0.10"/>

  <!-- Shaded region p >= 0.5 -->
  <polygon points="380,242 380,202 412,161 443,106 475,54 506,32 538,57 569,123 601,192 632,232 664,242 695,242"
           fill="#6366F1" fill-opacity="0.25"/>

  <!-- Dashed vertical at p = 0.5 -->
  <line x1="380" y1="30" x2="380" y2="242" stroke="#6B7280" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Dashed vertical at mode p = 0.7 -->
  <line x1="506" y1="30" x2="506" y2="242" stroke="#6B7280" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Main curve -->
  <polyline points="65,242 128,242 191,242 254,242 285,241 317,237 348,226 380,202 412,161 443,106 475,54 506,32 538,57 569,123 601,192 632,232 664,242 695,242"
            fill="none" stroke="#818CF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- X-axis line -->
  <line x1="65" y1="242" x2="695" y2="242" stroke="#4B5563" stroke-width="1"/>

  <!-- X-axis ticks -->
  <line x1="65"  y1="242" x2="65"  y2="248" stroke="#6B7280" stroke-width="1"/>
  <line x1="223" y1="242" x2="223" y2="248" stroke="#6B7280" stroke-width="1"/>
  <line x1="380" y1="242" x2="380" y2="248" stroke="#6B7280" stroke-width="1"/>
  <line x1="538" y1="242" x2="538" y2="248" stroke="#6B7280" stroke-width="1"/>
  <line x1="695" y1="242" x2="695" y2="248" stroke="#6B7280" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="65"  y="261" text-anchor="middle" fill="#9CA3AF" font-size="11">0</text>
  <text x="223" y="261" text-anchor="middle" fill="#9CA3AF" font-size="11">0.25</text>
  <text x="380" y="261" text-anchor="middle" fill="#9CA3AF" font-size="11">0.5</text>
  <text x="538" y="261" text-anchor="middle" fill="#9CA3AF" font-size="11">0.75</text>
  <text x="695" y="261" text-anchor="middle" fill="#9CA3AF" font-size="11">1.0</text>

  <!-- X-axis title -->
  <text x="380" y="280" text-anchor="middle" fill="#9CA3AF" font-size="12">p (probability of heads)</text>

  <!-- Mode annotation -->
  <text x="512" y="47" fill="#A5B4FC" font-size="11" font-weight="bold">mode = 0.7</text>

  <!-- Shading label -->
  <text x="594" y="158" text-anchor="middle" fill="#A5B4FC" font-size="12" font-weight="bold">P(p &gt; 0.5)</text>
  <text x="594" y="174" text-anchor="middle" fill="#A5B4FC" font-size="12" font-weight="bold">≈ 96%</text>
</svg>
