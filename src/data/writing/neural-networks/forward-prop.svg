<svg viewBox="0 0 760 345" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="13">
  <rect width="760" height="345" fill="#F9FAFB" rx="8"/>

  <!-- Connection lines -->
  <g stroke="#BFDBFE" stroke-width="1.5">
    <line x1="100" y1="100" x2="390" y2="100"/>
    <line x1="100" y1="100" x2="390" y2="190"/>
    <line x1="100" y1="100" x2="390" y2="280"/>
    <line x1="100" y1="190" x2="390" y2="100"/>
    <line x1="100" y1="190" x2="390" y2="190"/>
    <line x1="100" y1="190" x2="390" y2="280"/>
    <line x1="100" y1="280" x2="390" y2="100"/>
    <line x1="100" y1="280" x2="390" y2="190"/>
    <line x1="100" y1="280" x2="390" y2="280"/>
    <line x1="390" y1="100" x2="660" y2="145"/>
    <line x1="390" y1="100" x2="660" y2="235"/>
    <line x1="390" y1="190" x2="660" y2="145"/>
    <line x1="390" y1="190" x2="660" y2="235"/>
    <line x1="390" y1="280" x2="660" y2="145"/>
    <line x1="390" y1="280" x2="660" y2="235"/>
  </g>

  <!-- Input nodes -->
  <g fill="#3B82F6" stroke="#1D4ED8" stroke-width="2">
    <circle cx="100" cy="100" r="26"/>
    <circle cx="100" cy="190" r="26"/>
    <circle cx="100" cy="280" r="26"/>
  </g>
  <g fill="white" font-weight="bold">
    <text x="100" y="100" text-anchor="middle" dominant-baseline="central">x₁</text>
    <text x="100" y="190" text-anchor="middle" dominant-baseline="central">x₂</text>
    <text x="100" y="280" text-anchor="middle" dominant-baseline="central">x₃</text>
  </g>

  <!-- Hidden nodes -->
  <g fill="#8B5CF6" stroke="#6D28D9" stroke-width="2">
    <circle cx="390" cy="100" r="26"/>
    <circle cx="390" cy="190" r="26"/>
    <circle cx="390" cy="280" r="26"/>
  </g>
  <g fill="white" font-size="11">
    <text x="390" y="95"  text-anchor="middle" dominant-baseline="central">Σ</text>
    <text x="390" y="108" text-anchor="middle" dominant-baseline="central" font-size="9">f(z)</text>
    <text x="390" y="185" text-anchor="middle" dominant-baseline="central">Σ</text>
    <text x="390" y="198" text-anchor="middle" dominant-baseline="central" font-size="9">f(z)</text>
    <text x="390" y="275" text-anchor="middle" dominant-baseline="central">Σ</text>
    <text x="390" y="288" text-anchor="middle" dominant-baseline="central" font-size="9">f(z)</text>
  </g>

  <!-- Output nodes -->
  <g fill="#10B981" stroke="#065F46" stroke-width="2">
    <circle cx="660" cy="145" r="26"/>
    <circle cx="660" cy="235" r="26"/>
  </g>
  <g fill="white" font-weight="bold">
    <text x="660" y="145" text-anchor="middle" dominant-baseline="central">ŷ₁</text>
    <text x="660" y="235" text-anchor="middle" dominant-baseline="central">ŷ₂</text>
  </g>

  <!-- Layer labels -->
  <text x="100" y="332" text-anchor="middle" fill="#9CA3AF" font-size="11">Input</text>
  <text x="390" y="332" text-anchor="middle" fill="#9CA3AF" font-size="11">Hidden</text>
  <text x="660" y="290" text-anchor="middle" fill="#9CA3AF" font-size="11">Output</text>

  <!-- Direction label -->
  <text x="380" y="38" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="bold">→  Forward Pass</text>
