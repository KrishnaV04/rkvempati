<svg viewBox="0 0 760 240" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="13">
  <rect width="760" height="240" fill="#F9FAFB" rx="8"/>

  <!-- ── PANEL 1: ReLU (center 125, 108) ── -->
  <rect x="28" y="18" width="200" height="178" fill="white" stroke="#E5E7EB" rx="4"/>
  <!-- Axes -->
  <line x1="38" y1="108" x2="220" y2="108" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="125" y1="22" x2="125" y2="192" stroke="#D1D5DB" stroke-width="1"/>
  <!-- Tick labels -->
  <text x="116" y="32" text-anchor="end" fill="#9CA3AF" font-size="10">1</text>
  <text x="162" y="121" text-anchor="middle" fill="#9CA3AF" font-size="10">1</text>
  <text x="88"  y="121" text-anchor="middle" fill="#9CA3AF" font-size="10">-1</text>
  <!-- ReLU curve: flat then diagonal (y=max(0,x), x in [-2.5,2.5], y scale 80px/unit) -->
  <!-- x_px = 125 + x*36, y_px = 108 - y*80 -->
  <!-- Flat: (-2.5,0)→(0,0): (35,108)→(125,108). Rise: (0,0)→(1,1): (125,108)→(161,28) -->
  <polyline points="35,108 125,108 197,28" fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Title -->
  <text x="125" y="210" text-anchor="middle" fill="#1F2937" font-weight="bold" font-size="13">ReLU</text>
  <text x="125" y="224" text-anchor="middle" fill="#9CA3AF" font-size="11">max(0, z)</text>

  <!-- ── PANEL 2: Sigmoid (center 380, 108) ── -->
  <rect x="280" y="18" width="200" height="178" fill="white" stroke="#E5E7EB" rx="4"/>
  <!-- Axes -->
  <line x1="290" y1="108" x2="472" y2="108" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="380" y1="22" x2="380" y2="192" stroke="#D1D5DB" stroke-width="1"/>
  <!-- Tick labels (output range 0 to 1, so y=0 is at bottom of range) -->
  <!-- Map: y=0 → y_px=148, y=0.5 → y_px=108, y=1 → y_px=68 -->
  <text x="371" y="72" text-anchor="end" fill="#9CA3AF" font-size="10">1</text>
  <text x="371" y="152" text-anchor="end" fill="#9CA3AF" font-size="10">0</text>
  <!-- Sigmoid polyline: y=1/(1+e^-x), x in [-2.5,2.5] -->
  <!-- x_px=380+x*36, y_px=108-(y-0.5)*80 -->
  <!-- x=-2.5: y=0.076 → (290, 108-(0.076-0.5)*80)=(290,141.9≈142) -->
  <!-- x=-2:   y=0.119 → (308, 108-(-0.381)*80)=(308,138.5≈139) -->
  <!-- x=-1.5: y=0.182 → (326, 108-(-0.318)*80)=(326,133.4≈133) -->
  <!-- x=-1:   y=0.269 → (344, 108-(-0.231)*80)=(344,126.5≈127) -->
  <!-- x=-0.5: y=0.378 → (362, 108-(-0.122)*80)=(362,117.8≈118) -->
  <!-- x=0:    y=0.5   → (380, 108) -->
  <!-- x=0.5:  y=0.622 → (398, 108-(0.122)*80)=(398,98.2≈98) -->
  <!-- x=1:    y=0.731 → (416, 108-(0.231)*80)=(416,89.5≈90) -->
  <!-- x=1.5:  y=0.818 → (434, 108-(0.318)*80)=(434,82.6≈83) -->
  <!-- x=2:    y=0.881 → (452, 108-(0.381)*80)=(452,77.5≈78) -->
  <!-- x=2.5:  y=0.924 → (470, 108-(0.424)*80)=(470,74.1≈74) -->
  <polyline points="290,142 308,139 326,133 344,127 362,118 380,108 398,98 416,90 434,83 452,78 470,74"
            fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Title -->
  <text x="380" y="210" text-anchor="middle" fill="#1F2937" font-weight="bold" font-size="13">Sigmoid</text>
  <text x="380" y="224" text-anchor="middle" fill="#9CA3AF" font-size="11">1 / (1 + e⁻ᶻ)</text>

  <!-- ── PANEL 3: Tanh (center 635, 108) ── -->
  <rect x="532" y="18" width="200" height="178" fill="white" stroke="#E5E7EB" rx="4"/>
  <!-- Axes -->
  <line x1="542" y1="108" x2="724" y2="108" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="635" y1="22" x2="635" y2="192" stroke="#D1D5DB" stroke-width="1"/>
  <!-- Tick labels: y=1 → y_px=68, y=-1 → y_px=148 -->
  <text x="626" y="72" text-anchor="end" fill="#9CA3AF" font-size="10">1</text>
  <text x="626" y="152" text-anchor="end" fill="#9CA3AF" font-size="10">-1</text>
  <!-- Tanh polyline: y=tanh(x), x in [-2.5,2.5] -->
  <!-- x_px=635+x*36, y_px=108-y*40 -->
  <!-- x=-2.5: y=-0.987 → (545, 108+39.5≈148) -->
  <!-- x=-2:   y=-0.964 → (563, 147) -->
  <!-- x=-1.5: y=-0.905 → (581, 144) -->
  <!-- x=-1:   y=-0.762 → (599, 138) -->
  <!-- x=-0.5: y=-0.462 → (617, 126) -->
  <!-- x=0:    y=0      → (635, 108) -->
  <!-- x=0.5:  y=0.462  → (653, 90) -->
  <!-- x=1:    y=0.762  → (671, 78) -->
  <!-- x=1.5:  y=0.905  → (689, 72) -->
  <!-- x=2:    y=0.964  → (707, 69) -->
  <!-- x=2.5:  y=0.987  → (725, 68) -->
  <polyline points="545,148 563,147 581,144 599,138 617,126 635,108 653,90 671,78 689,72 707,69 725,68"
            fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Title -->
  <text x="635" y="210" text-anchor="middle" fill="#1F2937" font-weight="bold" font-size="13">Tanh</text>
  <text x="635" y="224" text-anchor="middle" fill="#9CA3AF" font-size="11">tanh(z)</text>
</svg>
