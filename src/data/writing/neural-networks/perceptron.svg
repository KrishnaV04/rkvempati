<svg viewBox="0 0 760 290" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="14">
  <rect width="760" height="290" fill="#F9FAFB" rx="8"/>

  <!-- Connection lines (drawn before nodes) -->
  <g stroke="#9CA3AF" stroke-width="1.5">
    <line x1="80" y1="75" x2="420" y2="150"/>
    <line x1="80" y1="155" x2="420" y2="155"/>
    <line x1="80" y1="235" x2="420" y2="160"/>
    <line x1="200" y1="265" x2="420" y2="165" stroke-dasharray="6,4"/>
  </g>

  <!-- Weight label backgrounds + labels -->
  <rect x="237" y="99" width="26" height="18" fill="#FEF3C7" rx="3"/>
  <text x="250" y="112" text-anchor="middle" fill="#D97706" font-weight="bold" font-size="13">w₁</text>

  <rect x="237" y="146" width="26" height="18" fill="#FEF3C7" rx="3"/>
  <text x="250" y="159" text-anchor="middle" fill="#D97706" font-weight="bold" font-size="13">w₂</text>

  <rect x="237" y="193" width="26" height="18" fill="#FEF3C7" rx="3"/>
  <text x="250" y="206" text-anchor="middle" fill="#D97706" font-weight="bold" font-size="13">w₃</text>

  <!-- Input nodes -->
  <circle cx="80" cy="75"  r="28" fill="#3B82F6" stroke="#1D4ED8" stroke-width="2"/>
  <text x="80" y="75"  text-anchor="middle" dominant-baseline="central" fill="white" font-weight="bold">x₁</text>

  <circle cx="80" cy="155" r="28" fill="#3B82F6" stroke="#1D4ED8" stroke-width="2"/>
  <text x="80" y="155" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="bold">x₂</text>

  <circle cx="80" cy="235" r="28" fill="#3B82F6" stroke="#1D4ED8" stroke-width="2"/>
  <text x="80" y="235" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="bold">x₃</text>

  <!-- Bias node -->
  <circle cx="200" cy="265" r="22" fill="#9CA3AF" stroke="#6B7280" stroke-width="2"/>
  <text x="200" y="265" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="bold" font-size="13">b</text>

  <!-- Neuron -->
  <circle cx="420" cy="155" r="46" fill="white" stroke="#10B981" stroke-width="2.5"/>
  <text x="420" y="147" text-anchor="middle" dominant-baseline="central" fill="#065F46" font-size="22" font-weight="bold">Σ</text>
  <line x1="382" y1="159" x2="458" y2="159" stroke="#A7F3D0" stroke-width="1"/>
  <text x="420" y="170" text-anchor="middle" dominant-baseline="central" fill="#10B981" font-size="12">activation</text>

  <!-- Output arrow -->
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#1F2937"/>
    </marker>
  </defs>
  <line x1="466" y1="155" x2="596" y2="155" stroke="#1F2937" stroke-width="2" marker-end="url(#ah)"/>
  <text x="636" y="155" text-anchor="middle" dominant-baseline="central" fill="#1F2937" font-weight="bold">output</text>
</svg>
