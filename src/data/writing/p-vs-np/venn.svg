<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="360" fill="#F9FAFB" rx="8"/>

  <!-- Decision Problems background -->
  <rect x="22" y="18" width="716" height="324" fill="#EFF6FF" rx="10" stroke="#BFDBFE" stroke-width="1.5"/>

  <!-- NP ellipse -->
  <ellipse cx="370" cy="200" rx="298" ry="138" fill="#C7D2FE" fill-opacity="0.6" stroke="#6366F1" stroke-width="2"/>

  <!-- P ellipse -->
  <ellipse cx="218" cy="200" rx="128" ry="92" fill="#DBEAFE" fill-opacity="0.85" stroke="#3B82F6" stroke-width="2"/>

  <!-- NP-Complete ellipse -->
  <ellipse cx="522" cy="200" rx="114" ry="92" fill="#FEF3C7" fill-opacity="0.9" stroke="#D97706" stroke-width="2"/>

  <!-- Decision Problems label (above NP ellipse) -->
  <text x="370" y="40" text-anchor="middle" fill="#1E3A8A" font-size="13" font-weight="bold">Decision Problems</text>

  <!-- NP label (inside NP but above P and NPC tops) -->
  <text x="370" y="78" text-anchor="middle" fill="#4338CA" font-size="13" font-weight="bold">NP</text>

  <!-- P label + examples -->
  <text x="218" y="188" text-anchor="middle" fill="#1D4ED8" font-size="14" font-weight="bold">P</text>
  <text x="218" y="207" text-anchor="middle" fill="#2563EB" font-size="10">Sorting, Multiplication</text>
  <text x="218" y="220" text-anchor="middle" fill="#2563EB" font-size="10">PRIMES (since 2002)</text>

  <!-- NP-Complete label + examples -->
  <text x="522" y="188" text-anchor="middle" fill="#92400E" font-size="12" font-weight="bold">NP-Complete</text>
  <text x="522" y="207" text-anchor="middle" fill="#B45309" font-size="10">SAT, 3-SAT</text>
  <text x="522" y="220" text-anchor="middle" fill="#B45309" font-size="10">Graph Coloring, TSP</text>

  <!-- P ⊆ NP annotation -->
  <text x="370" y="348" text-anchor="middle" fill="#9CA3AF" font-size="11">P ⊆ NP ⊆ Decision Problems</text>
</svg>
