<svg viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="13">
  <rect width="760" height="250" fill="#F9FAFB" rx="8"/>

  <!-- Panel divider -->
  <line x1="380" y1="20" x2="380" y2="235" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- ── LEFT PANEL: DTM ── -->
  <text x="190" y="30" text-anchor="middle" fill="#1F2937" font-size="13" font-weight="bold">Deterministic (DTM)</text>

  <!-- Linear path arrows -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#6B7280"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#10B981"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3B82F6"/>
    </marker>
  </defs>

  <g stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)">
    <line x1="92"  y1="128" x2="148" y2="128"/>
    <line x1="192" y1="128" x2="248" y2="128"/>
    <line x1="292" y1="128" x2="330" y2="128"/>
  </g>

  <!-- State nodes -->
  <g fill="#EFF6FF" stroke="#3B82F6" stroke-width="2">
    <circle cx="70"  cy="128" r="22"/>
    <circle cx="170" cy="128" r="22"/>
    <circle cx="270" cy="128" r="22"/>
  </g>
  <g fill="#3B82F6" font-size="11" font-weight="bold">
    <text x="70"  y="128" text-anchor="middle" dominant-baseline="central">s₀</text>
    <text x="170" y="128" text-anchor="middle" dominant-baseline="central">s₁</text>
    <text x="270" y="128" text-anchor="middle" dominant-baseline="central">s₂</text>
  </g>

  <!-- Accept terminal -->
  <circle cx="352" cy="128" r="22" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="352" y="128" text-anchor="middle" dominant-baseline="central" fill="#065F46" font-size="10" font-weight="bold">accept</text>

  <text x="190" y="175" text-anchor="middle" fill="#9CA3AF" font-size="11">one path, one outcome</text>

  <!-- ── RIGHT PANEL: NTM ── -->
  <text x="570" y="30" text-anchor="middle" fill="#1F2937" font-size="13" font-weight="bold">Non-Deterministic (NTM)</text>

  <!-- Tree lines -->
  <g stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)">
    <!-- root → level 1 -->
    <line x1="432" y1="120" x2="518" y2="78"/>
    <line x1="432" y1="136" x2="518" y2="178"/>
    <!-- L1-top → level 2 -->
    <line x1="562" y1="70" x2="638" y2="50"/>
    <line x1="562" y1="84" x2="638" y2="104"/>
    <!-- L1-bottom → level 2 -->
    <line x1="562" y1="170" x2="638" y2="150"/>
    <line x1="562" y1="184" x2="638" y2="204"/>
  </g>

  <!-- Root node -->
  <circle cx="410" cy="128" r="22" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="410" y="128" text-anchor="middle" dominant-baseline="central" fill="#3B82F6" font-size="11" font-weight="bold">s₀</text>

  <!-- Level 1 nodes -->
  <g fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5">
    <circle cx="540" cy="77"  r="20"/>
    <circle cx="540" cy="177" r="20"/>
  </g>

  <!-- Level 2 leaf nodes: accept (green) and reject (red) -->
  <circle cx="658" cy="48"  r="18" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="658" y="48"  text-anchor="middle" dominant-baseline="central" fill="#065F46" font-size="11">✓</text>

  <circle cx="658" cy="106" r="18" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="658" y="106" text-anchor="middle" dominant-baseline="central" fill="#B91C1C" font-size="11">✗</text>

  <circle cx="658" cy="150" r="18" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="658" y="150" text-anchor="middle" dominant-baseline="central" fill="#B91C1C" font-size="11">✗</text>

  <circle cx="658" cy="208" r="18" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="658" y="208" text-anchor="middle" dominant-baseline="central" fill="#065F46" font-size="11">✓</text>

  <text x="570" y="238" text-anchor="middle" fill="#9CA3AF" font-size="11">all paths explored simultaneously</text>
</svg>
